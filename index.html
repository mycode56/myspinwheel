<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Spin Wheel</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #07070f;
      --purple:    #7c3aed;
      --indigo:    #4f46e5;
      --violet:    #a78bfa;
      --gold:      #c9a227;
      --text:      #e4e0ff;
      --muted:     rgba(167,139,250,.3);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* ── starfield ── */
    #stars {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse at 50% 30%, #0e0a1f 0%, #07070f 70%);
    }
    #stars::before, #stars::after {
      content: '';
      position: absolute; inset: 0;
      background-image:
        radial-gradient(1px 1px at 12% 20%, rgba(200,190,255,.55) 0%, transparent 100%),
        radial-gradient(1px 1px at 78% 12%, rgba(200,190,255,.40) 0%, transparent 100%),
        radial-gradient(1px 1px at 44% 68%, rgba(200,190,255,.65) 0%, transparent 100%),
        radial-gradient(1px 1px at 9%  82%, rgba(200,190,255,.35) 0%, transparent 100%),
        radial-gradient(1px 1px at 91% 48%, rgba(200,190,255,.50) 0%, transparent 100%),
        radial-gradient(1px 1px at 33% 88%, rgba(200,190,255,.30) 0%, transparent 100%),
        radial-gradient(1px 1px at 62% 33%, rgba(200,190,255,.45) 0%, transparent 100%),
        radial-gradient(1px 1px at 87% 72%, rgba(200,190,255,.40) 0%, transparent 100%);
      background-size: 380px 380px;
      animation: twinkle 5s infinite alternate;
    }
    #stars::after { animation-delay: 2.5s; background-size: 520px 520px; opacity: .7; }
    @keyframes twinkle { from { opacity:.4 } to { opacity:.85 } }

    /* ── particle canvas ── */
    #particles {
      position: fixed; inset: 0; z-index: 49;
      pointer-events: none;
    }

    /* ── result modal ── */
    #modal-overlay {
      position: fixed; inset: 0; z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(7, 7, 15, 0.8);
      backdrop-filter: blur(8px);
      cursor: pointer;
    }
    #modal-overlay.hidden { display: none; }

    #modal-card {
      position: relative;
      text-align: center;
      padding: 52px 64px 44px;
      border-radius: 12px;
      background: rgba(10, 8, 24, 0.96);
      border: 2px solid var(--purple);
      box-shadow: 0 0 40px rgba(124,58,237,.3), inset 0 0 30px rgba(124,58,237,.05);
      cursor: default;
      max-width: min(520px, 90vw);
      width: 100%;
    }
    #modal-card.pop {
      animation: cardPop .55s cubic-bezier(.175,.885,.32,1.275) both;
    }
    @keyframes cardPop {
      0%   { transform: scale(.45) translateY(40px); opacity: 0; }
      65%  { transform: scale(1.04); }
      100% { transform: scale(1); opacity: 1; }
    }

    #modal-close {
      position: absolute;
      top: 14px; right: 18px;
      background: none; border: none;
      color: rgba(167,139,250,.35);
      font-size: 1.1rem;
      cursor: pointer;
      line-height: 1;
      padding: 4px;
      transition: color .2s;
    }
    #modal-close:hover { color: var(--violet); }

    .modal-eyebrow {
      font-family: 'Rajdhani', sans-serif;
      font-size: .7rem;
      letter-spacing: .35em;
      text-transform: uppercase;
      color: rgba(167,139,250,.45);
      margin-bottom: 16px;
    }

    #resultText {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2rem, 7vw, 3.6rem);
      font-weight: 900;
      letter-spacing: .12em;
      line-height: 1.1;
    }
    #resultText.pulse {
      animation: rankPulse 1.6s ease-in-out 3;
    }
    @keyframes rankPulse {
      0%, 100% { filter: brightness(1); }
      50%       { filter: brightness(1.6) drop-shadow(0 0 14px currentColor); }
    }

    #resultSub {
      margin-top: 16px;
      font-size: 1.05rem;
      color: rgba(228,224,255,.4);
      letter-spacing: .05em;
      animation: subFade .4s .2s ease both;
    }
    @keyframes subFade {
      from { opacity:0; transform:translateY(6px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .modal-dismiss {
      margin-top: 28px;
      font-size: .68rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: rgba(167,139,250,.25);
    }

    /* ── layout ── */
    header, main, footer { position: relative; z-index: 1; width: 100%; }

    header {
      text-align: center;
      padding: 56px 20px 28px;
    }
    header h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2rem, 6vw, 4.5rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .15em;
      background: linear-gradient(135deg, var(--violet), var(--purple), var(--indigo));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 12px rgba(124,58,237,.4));
    }
    header p {
      margin-top: 10px;
      font-size: 1.05rem;
      color: rgba(167,139,250,.4);
      letter-spacing: .1em;
    }

    .divider {
      width: 80%;
      max-width: 600px;
      height: 1px;
      margin: 0 auto 48px;
      background: linear-gradient(90deg, transparent, var(--purple), var(--indigo), transparent);
      opacity: .45;
    }

    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 34px;
      padding: 0 20px 80px;
    }

    .wheel-wrapper {
      position: relative;
      width: min(480px, 90vw);
      height: min(480px, 90vw);
    }

    .pointer {
      position: absolute;
      top: 50%;
      right: -28px;
      transform: translateY(-50%);
      width: 0; height: 0;
      border-top:    16px solid transparent;
      border-bottom: 16px solid transparent;
      border-right:  32px solid var(--gold);
      filter: drop-shadow(0 0 5px rgba(201,162,39,.6));
      z-index: 10;
    }

    canvas#wheel {
      width: 100%; height: 100%;
      border-radius: 50%;
      box-shadow: 0 0 20px rgba(124,58,237,.2), 0 0 0 2px rgba(124,58,237,.2);
    }

    .hub {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 50px; height: 50px;
      border-radius: 50%;
      background: radial-gradient(circle, #160d2e, #07070f);
      border: 2px solid rgba(124,58,237,.55);
      box-shadow: 0 0 10px rgba(124,58,237,.3);
      z-index: 5;
    }

    /* ── spin button ── */
    #spinBtn {
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: #fff;
      background: linear-gradient(135deg, var(--purple), var(--indigo));
      border: none;
      padding: 16px 52px;
      border-radius: 6px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform .15s, box-shadow .15s;
      box-shadow: 0 0 16px rgba(124,58,237,.35);
    }
    #spinBtn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, var(--indigo), var(--purple));
      opacity: 0;
      transition: opacity .3s;
    }
    #spinBtn:hover:not(:disabled) { transform: scale(1.05); box-shadow: 0 0 26px rgba(124,58,237,.6); }
    #spinBtn:hover::before { opacity: 1; }
    #spinBtn span { position: relative; z-index: 1; }
    #spinBtn:disabled { opacity: .4; cursor: not-allowed; }

    /* ── odds table ── */
    .odds-section {
      width: 100%;
      max-width: 540px;
      margin: 0 auto;
      padding: 0 20px 60px;
      position: relative; z-index: 1;
    }
    .odds-section h3 {
      font-family: 'Orbitron', sans-serif;
      font-size: .68rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: rgba(167,139,250,.22);
      text-align: center;
      margin-bottom: 14px;
    }
    .odds-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(118px, 1fr));
      gap: 7px;
    }
    .odds-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 4px;
      background: rgba(124,58,237,.04);
      border: 1px solid rgba(124,58,237,.1);
    }
    .odds-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .odds-label { font-size: .74rem; font-family: 'Orbitron', sans-serif; letter-spacing: .04em; flex: 1; }
    .odds-pct  { font-size: .68rem; color: rgba(167,139,250,.3); flex-shrink: 0; }

    footer {
      text-align: center;
      padding: 16px;
      font-size: .7rem;
      color: rgba(167,139,250,.15);
      letter-spacing: .06em;
      position: relative; z-index: 1;
    }
  </style>
</head>
<body>

<div id="stars"></div>
<canvas id="particles"></canvas>

<!-- Result modal -->
<div id="modal-overlay" class="hidden">
  <div id="modal-card">
    <button id="modal-close">✕</button>
    <div class="modal-eyebrow">Your Rank</div>
    <h2 id="resultText"></h2>
    <p id="resultSub"></p>
    <div class="modal-dismiss">click anywhere to close</div>
  </div>
</div>

<header>
  <h1>My Spin Wheel</h1>
  <p>Discover your rank</p>
</header>

<div class="divider"></div>

<main>
  <div class="wheel-wrapper">
    <canvas id="wheel" width="480" height="480"></canvas>
    <div class="hub"></div>
    <div class="pointer"></div>
  </div>
  <button id="spinBtn"><span>⚔️ SPIN ⚔️</span></button>
</main>

<div class="odds-section">
  <h3>Drop Rates</h3>
  <div class="odds-grid" id="oddsGrid"></div>
</div>

<footer>© 2026 My Spin Wheel</footer>

<script>
  const ranks = [
    { label: 'Iron',        prob: 8.6,  visual: 9,    color: '#888888', sub: 'Every legend starts somewhere.' },
    { label: 'Bronze',      prob: 20.0, visual: 19,   color: '#b87333', sub: 'Grinding through the trenches.' },
    { label: 'Silver',      prob: 25.0, visual: 23,   color: '#aaaaaa', sub: 'Solid fundamentals.' },
    { label: 'Gold',        prob: 22.0, visual: 21,   color: '#d4a800', sub: 'Above average. Respect.' },
    { label: 'Platinum',    prob: 11.0, visual: 11,   color: '#00a888', sub: 'Top 20%. Not bad at all.' },
    { label: 'Emerald',     prob: 7.0,  visual: 7,    color: '#3daa5e', sub: 'Top 13%. You\'re different.' },
    { label: 'Diamond',     prob: 4.0,  visual: 5,    color: '#5aaad8', sub: 'Top 6%. That\'s elite.' },
    { label: 'Master',      prob: 1.0,  visual: 3,    color: '#9a3fd8', sub: 'Top 1%. Genuinely cracked.' },
    { label: 'Grandmaster', prob: 0.3,  visual: 1.5,  color: '#dd3333', sub: 'Top 0.3%. You\'re a menace.' },
    { label: 'Challenger',  prob: 0.1,  visual: 0.5,  color: '#00ccee', sub: '🏆 Top 0.1%. The chosen one.' },
  ];

  const totalVisual = ranks.reduce((s, r) => s + r.visual, 0);
  const totalProb   = ranks.reduce((s, r) => s + r.prob, 0);

  let cum = 0;
  const segs = ranks.map(r => {
    const arc = (r.visual / totalVisual) * 2 * Math.PI;
    const arcStart = cum;
    cum += arc;
    return { ...r, arc, arcStart, arcEnd: cum };
  });

  // Odds table
  const grid = document.getElementById('oddsGrid');
  ranks.forEach(r => {
    const pct = ((r.prob / totalProb) * 100).toFixed(r.prob < 1 ? 2 : 1);
    grid.insertAdjacentHTML('beforeend', `
      <div class="odds-item">
        <div class="odds-dot" style="background:${r.color}"></div>
        <span class="odds-label" style="color:${r.color}">${r.label}</span>
        <span class="odds-pct">${pct}%</span>
      </div>`);
  });

  function pickWinner() {
    let rand = Math.random() * totalProb;
    for (const r of ranks) {
      rand -= r.prob;
      if (rand <= 0) return r.label;
    }
    return ranks[ranks.length - 1].label;
  }

  // ── Wheel ──
  const canvas = document.getElementById('wheel');
  const ctx    = canvas.getContext('2d');
  const CX = canvas.width / 2;
  const CY = canvas.height / 2;
  const R  = CX - 8;

  let rotation = 0;
  let spinning  = false;

  function drawWheel(rot) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    segs.forEach(seg => {
      const s = rot + seg.arcStart;
      const e = rot + seg.arcEnd;

      ctx.beginPath();
      ctx.moveTo(CX, CY);
      ctx.arc(CX, CY, R, s, e);
      ctx.closePath();
      ctx.fillStyle = seg.color + '15';
      ctx.fill();

      ctx.strokeStyle = seg.color;
      ctx.lineWidth   = 1.5;
      ctx.shadowColor = seg.color;
      ctx.shadowBlur  = 4;
      ctx.stroke();
      ctx.shadowBlur  = 0;

      const arcDeg = (seg.arc * 180) / Math.PI;
      if (arcDeg < 5) return;

      const mid = rot + seg.arcStart + seg.arc / 2;
      ctx.save();
      ctx.translate(CX, CY);
      ctx.rotate(mid);
      ctx.textAlign = 'right';
      const fontSize = arcDeg > 25 ? 13 : arcDeg > 14 ? 11 : 9;
      const text     = arcDeg < 18 ? seg.label.slice(0, 4).toUpperCase() : seg.label.toUpperCase();
      ctx.font        = `bold ${fontSize}px Orbitron, sans-serif`;
      ctx.fillStyle   = seg.color;
      ctx.shadowColor = seg.color;
      ctx.shadowBlur  = 4;
      ctx.fillText(text, R - 12, 4);
      ctx.restore();
    });

    // Outer ring — purple theme
    ctx.beginPath();
    ctx.arc(CX, CY, R, 0, 2 * Math.PI);
    ctx.strokeStyle = 'rgba(124,58,237,.4)';
    ctx.lineWidth   = 3;
    ctx.shadowColor = '#7c3aed';
    ctx.shadowBlur  = 10;
    ctx.stroke();
    ctx.shadowBlur  = 0;
  }

  drawWheel(rotation);

  // ── Particles ──
  const pCanvas = document.getElementById('particles');
  const pCtx    = pCanvas.getContext('2d');
  let pFrame;

  function spawnParticles(color) {
    pCanvas.width  = window.innerWidth;
    pCanvas.height = window.innerHeight;
    cancelAnimationFrame(pFrame);

    const cx = pCanvas.width / 2;
    const cy = pCanvas.height / 2;
    const particles = [];

    for (let i = 0; i < 80; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 2.5 + Math.random() * 8;
      particles.push({
        x: cx, y: cy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        size: 2 + Math.random() * 3,
        alpha: 1,
      });
    }

    function animP() {
      pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
      let alive = false;
      particles.forEach(p => {
        if (p.alpha <= 0) return;
        p.x  += p.vx;
        p.y  += p.vy;
        p.vy += 0.1;
        p.vx *= 0.98;
        p.alpha -= 0.013;
        alive = true;
        const hex = Math.max(0, Math.floor(p.alpha * 255)).toString(16).padStart(2, '0');
        pCtx.beginPath();
        pCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        pCtx.fillStyle   = color + hex;
        pCtx.shadowColor = color;
        pCtx.shadowBlur  = 6;
        pCtx.fill();
      });
      if (alive) pFrame = requestAnimationFrame(animP);
      else pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
    }
    animP();
  }

  // ── Modal ──
  const overlay  = document.getElementById('modal-overlay');
  const card     = document.getElementById('modal-card');
  const resText  = document.getElementById('resultText');
  const resSub   = document.getElementById('resultSub');
  const closeBtn = document.getElementById('modal-close');

  function showModal(winner) {
    resText.textContent      = winner.label.toUpperCase();
    resText.style.color      = winner.color;
    resText.style.textShadow = `0 0 20px ${winner.color}`;
    card.style.borderColor   = winner.color;
    card.style.boxShadow     = `0 0 50px ${winner.color}40, 0 0 100px ${winner.color}18, inset 0 0 30px ${winner.color}08`;
    resSub.textContent       = winner.sub;

    card.classList.remove('pop');
    resText.classList.remove('pulse');
    void card.offsetWidth;
    card.classList.add('pop');
    resText.classList.add('pulse');

    overlay.classList.remove('hidden');
    spawnParticles(winner.color);
  }

  function closeModal() {
    overlay.classList.add('hidden');
    cancelAnimationFrame(pFrame);
    pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
  }

  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  closeBtn.addEventListener('click', closeModal);

  // ── Spin ──
  const btn = document.getElementById('spinBtn');

  btn.addEventListener('click', () => {
    if (spinning) return;
    spinning = true;
    btn.disabled = true;

    const winnerLabel = pickWinner();
    const winner      = segs.find(s => s.label === winnerLabel);

    const margin = winner.arc * 0.15;
    const targetInWheel = winner.arcStart + margin + Math.random() * (winner.arc - margin * 2);

    const normalizedRot = ((rotation % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
    const targetRot     = ((2 * Math.PI - targetInWheel) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);

    let delta = targetRot - normalizedRot;
    if (delta <= 0) delta += 2 * Math.PI;

    const numSpins      = 6 + Math.floor(Math.random() * 5);
    const totalRotation = numSpins * 2 * Math.PI + delta;
    const startRot      = rotation;
    const duration      = 4500 + Math.random() * 1500;
    const startTime     = performance.now();

    function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

    function animate(now) {
      const elapsed  = now - startTime;
      const progress = Math.min(elapsed / duration, 1);
      rotation = startRot + totalRotation * easeOut(progress);
      drawWheel(rotation);

      if (progress < 1) { requestAnimationFrame(animate); return; }

      spinning = false;
      btn.disabled = false;
      showModal(winner);
    }

    requestAnimationFrame(animate);
  });
</script>
</body>
</html>
